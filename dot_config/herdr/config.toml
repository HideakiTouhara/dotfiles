[keys]
# prefix key to enter navigate/prefix mode (default: ctrl+b)
prefix = "ctrl+a"

# tmux vim-navigator style: direct (no-prefix) Ctrl+h/j/k/l for pane focus
focus_pane_left = "ctrl+h"
focus_pane_down = "ctrl+j"
focus_pane_up = "ctrl+k"
focus_pane_right = "ctrl+l"

# tmux-style splits: | = left/right split, - = up/down split (prefix+minus is already default)
split_vertical = "prefix+|"

# workspace switching by number (prefix+1..9 is tab switching by default)
switch_workspace = "prefix+shift+1..9"
