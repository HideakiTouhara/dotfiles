onboarding = false
[keys]
# prefix key to enter navigate/prefix mode (default: ctrl+b)
prefix = "ctrl+a"

# tmux vim-navigator style: direct (no-prefix) Ctrl+h/l for left/right pane focus
focus_pane_left = "ctrl+h"
focus_pane_right = "ctrl+l"

# direct Ctrl+j/k cycles workspaces (vertical pane focus is unused; falls back to prefix+j/k)
next_workspace = "ctrl+j"
previous_workspace = "ctrl+k"

# tmux-style splits: | = left/right split, - = up/down split (prefix+minus is already default)
split_vertical = "prefix+|"

# workspace switching by number (workspaces get the prime numbers; tabs move to alt)
switch_workspace = "prefix+1..9"
switch_tab = "prefix+alt+1..9"

# notify via macOS Notification Center when background agents finish / need input
[ui.toast]
delivery = "system"
